# Environmentally Stable Profile
# Used for environments where WiFi APs or GPS signals are unstable.
modules:
  reboot: true
  firmware: true
  audio: true
  camera: true
  connectivity: true
  sensors: true
  power: true
  nfc: true
  gps: true
  auto_factory_reset: true

exclude_items:
  - "WiFi AP Connection"
  - "GPS Antenna Signal"
  - "Tag Read Verification" # NFC item is now PARTIAL, can be excluded if no tag present
  - "WWAN Data Transfer"
