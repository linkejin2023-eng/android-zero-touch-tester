# Android CI/CD Status Logic Registry
# Level definitions:
#   CRITICAL     - Failure results in [FAILED] status. (Blocker)
#   PARTIAL      - Failure results in [PARTIAL] status. (Quality Warning)
#   ENV_EXCLUDED - Failure results in [ENV-EXCLUDED] tag; excluded from Pass Rate calculation.

