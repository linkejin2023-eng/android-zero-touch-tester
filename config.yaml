# --- Android Smoke Test Configuration ---

modules:
  reboot: true
  audio: true
  camera: true
  connectivity: true
  sensors: true
  power: true
  nfc: true
  gps: true
  firmware: true
  auto_factory_reset: true

# --- Network Config ---
network:
  wifi_ssid: "Xiaomi_test"
  wifi_pass: "12345678"

# --- Thresholds ---
audio_entropy_threshold: 0.1
sensor_variance_threshold: 0.0001
camera_file_timeout: 10
reboot_timeout: 120
oobe_bypass_timeout: 300
